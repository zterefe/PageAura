<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PageAura</title>
  </head>
  <body>
    <main>
      <h1>PageAura</h1>
      <p>Current site: <strong id="hostname">loading...</strong></p>

      <label>
        <input id="site-enabled" type="checkbox" />
        Enable enhancements for this site
      </label>

      <label for="mode-selector">Mode</label>
      <select id="mode-selector">
        <option value="safe">safe</option>
        <option value="enhanced">enhanced</option>
        <option value="experimental">experimental</option>
      </select>

      <h2>Current page summary</h2>
      <p id="summary-placeholder">Loading summary...</p>

      <h2>Stored state</h2>
      <p>Debug mode: <strong id="debug-mode-state">loading...</strong></p>
      <p>Dismissed enhancements: <span id="dismissed-count">0</span></p>
      <p>Last execution signature: <code id="execution-signature">none</code></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
