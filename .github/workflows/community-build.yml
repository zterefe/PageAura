name: Community Build

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Package release zip
        run: npm run release:zip

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: pageaura-extension
          path: release/pageaura-extension.zip
