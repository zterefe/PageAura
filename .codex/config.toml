version = 1
default_role = "planner"
max_threads = 4
max_depth = 1
instructions_file = "README.md"
implement_runbook = "docs/PageAura_Public_Parallel_Implementation_Plan.md"
task_graph = "docs/task-graph.json"
sandbox_mode = "workspace-write"
approval_policy = "never"

[features]
multi_agent = true

[sandbox_workspace_write]
network_access = false
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

[roles.planner]
config = ".codex/agents/planner.toml"

[roles.worker]
config = ".codex/agents/worker.toml"

[roles.reviewer]
config = ".codex/agents/reviewer.toml"

[roles.explorer]
config = ".codex/agents/explorer.toml"

[mcp_servers.project_control]
url = "https://codex-remote-mcp-server.onrender.com/mcp"
startup_timeout_sec = 75
tool_timeout_sec = 60